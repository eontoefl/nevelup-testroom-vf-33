<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>입문서 에디터 데모 (어드민)</title>

  <!-- Pretendard -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <!-- Quill Snow theme -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #9480c5;
      --primary-light: #ede9f8;
      --primary-dark: #7b68ae;
      --bg: #f1f4f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 상단 바 ── */
    .topbar {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .topbar-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-title .badge-demo {
      font-size: 0.65rem;
      background: var(--warning);
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
    }

    .doc-title-input {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      width: 240px;
      transition: border-color 0.2s;
    }
    .doc-title-input:focus { outline: none; border-color: var(--primary); }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 18px;
      border-radius: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      font-family: inherit;
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 14px rgba(148,128,197,0.35);
    }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-success {
      background: var(--success);
      color: white;
    }
    .btn-success:hover { opacity: 0.88; }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }

    /* ── 메인 레이아웃 ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── 왼쪽: 페이지 패널 ── */
    .page-panel {
      width: 200px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .page-panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .page-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .page-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--muted);
      transition: all 0.15s;
      margin-bottom: 4px;
      position: relative;
    }
    .page-item:hover { background: var(--bg); color: var(--text); }
    .page-item.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
    }
    .page-item .page-num {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(148,128,197,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .page-item.active .page-num {
      background: var(--primary);
      color: white;
    }
    .page-item .page-label { flex: 1; margin-left: 8px; }
    .page-item .del-btn {
      opacity: 0;
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
    }
    .page-item:hover .del-btn { opacity: 1; }

    .page-panel-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .btn-add-page {
      width: 100%;
      padding: 10px;
      border-radius: 9px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-add-page:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    /* ── 가운데: 에디터 영역 ── */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      padding: 20px;
      gap: 12px;
    }
    .editor-meta {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .editor-meta strong { color: var(--primary); }

    .quill-container {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }
    /* Quill 툴바 커스텀 */
    .quill-container .ql-toolbar {
      border: none;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      padding: 10px 16px;
    }
    .quill-container .ql-container {
      flex: 1;
      border: none;
      font-size: 1rem;
      font-family: 'Pretendard', sans-serif;
      overflow-y: auto;
    }
    .quill-container .ql-editor {
      min-height: 100%;
      padding: 28px 36px;
      line-height: 1.8;
    }
    .quill-container .ql-editor.ql-blank::before {
      color: var(--muted);
      font-style: normal;
    }

    /* ── 오른쪽: 미리보기 ── */
    .preview-area {
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .preview-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-header h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* 가짜 폰 프레임 */
    .phone-frame {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      justify-content: center;
      background: var(--bg);
    }
    .phone-mockup {
      width: 300px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }
    .phone-topbar {
      background: #fff;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #f1f4f8;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .phone-topbar-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #1e293b;
    }
    .phone-progress {
      height: 3px;
      background: #f1f4f8;
    }
    .phone-progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s;
    }
    .phone-content {
      flex: 1;
      padding: 18px 16px;
      font-size: 0.82rem;
      line-height: 1.75;
      color: #2d3436;
      overflow-y: auto;
    }
    .phone-content h1 { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; color: #1e293b; }
    .phone-content h2 { font-size: 0.95rem; font-weight: 700; margin: 14px 0 8px; color: #1e293b; }
    .phone-content h3 { font-size: 0.88rem; font-weight: 700; margin: 10px 0 6px; color: #1e293b; }
    .phone-content p { margin-bottom: 8px; }
    .phone-content img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
    .phone-content ul, .phone-content ol { padding-left: 18px; margin-bottom: 8px; }
    .phone-content li { margin-bottom: 4px; }
    .phone-content strong { font-weight: 700; }
    .phone-content em { font-style: italic; }
    .phone-content u { text-decoration: underline; }
    .phone-toolbar {
      padding: 10px 14px;
      border-top: 1px solid #f1f4f8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }
    .phone-toolbar-page {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
    }
    .phone-toolbar-nav {
      display: flex;
      gap: 8px;
    }
    .phone-nav-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--muted);
      transition: all 0.15s;
    }
    .phone-nav-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ── 저장 토스트 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.875rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success i { color: var(--success); }
    .toast.info i { color: #60a5fa; }

    /* ── 빈 상태 ── */
    .empty-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
    }
    .empty-editor i { font-size: 2.5rem; opacity: 0.3; }
    .empty-editor p { font-size: 0.9rem; }

    /* ── 이미지 업로드 버튼 커스텀 ── */
    .img-upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .img-upload-btn:hover { border-color: var(--primary); color: var(--primary); }
    #imgFileInput { display: none; }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body>

<!-- ======= 상단 바 ======= -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">
      <i class="fa-solid fa-book-open" style="color:var(--primary)"></i>
      입문서 에디터
      <span class="badge-demo">DEMO</span>
    </div>
    <input type="text" class="doc-title-input" id="docTitle" value="내벨업 입문서 v3" placeholder="입문서 제목" />
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="previewInViewer()">
      <i class="fa-solid fa-eye"></i> 학습자 화면으로 보기
    </button>
    <button class="btn btn-primary" onclick="saveDemo()">
      <i class="fa-regular fa-floppy-disk"></i> 저장하기
    </button>
  </div>
</div>

<!-- ======= 메인 ======= -->
<div class="main">

  <!-- 왼쪽: 페이지 목록 -->
  <div class="page-panel">
    <div class="page-panel-header">페이지 목록</div>
    <div class="page-list" id="pageList"></div>
    <div class="page-panel-footer">
      <button class="btn-add-page" onclick="addPage()">
        <i class="fa-solid fa-plus"></i> 페이지 추가
      </button>
    </div>
  </div>

  <!-- 가운데: 에디터 -->
  <div class="editor-area">
    <div class="editor-meta">
      <i class="fa-solid fa-pen-nib" style="color:var(--primary)"></i>
      현재 편집 중:
      <strong id="currentPageLabel">1페이지</strong>
      <span style="margin-left:auto; display:flex; gap:8px; align-items:center;">
        <button class="img-upload-btn" onclick="document.getElementById('imgFileInput').click()">
          <i class="fa-regular fa-image"></i> 이미지 삽입
        </button>
        <input type="file" id="imgFileInput" accept="image/*" onchange="insertImage(this)" />
        <span style="color:var(--muted); font-size:0.78rem;">이미지는 Base64로 바로 삽입 (데모용)</span>
      </span>
    </div>
    <div class="quill-container">
      <div id="quillEditor"></div>
    </div>
  </div>

  <!-- 오른쪽: 학습자 미리보기 -->
  <div class="preview-area">
    <div class="preview-header">
      <h3><i class="fa-solid fa-mobile-screen"></i> 학습자 화면 미리보기</h3>
      <span style="font-size:0.75rem; color:var(--muted);">실시간</span>
    </div>
    <div class="phone-frame">
      <div class="phone-mockup">
        <div class="phone-topbar">
          <i class="fa-solid fa-arrow-left" style="color:#94a3b8; font-size:0.8rem;"></i>
          <span class="phone-topbar-title" id="phoneTitle">내벨업 입문서 v3</span>
          <i class="fa-regular fa-bookmark" style="color:#94a3b8; font-size:0.8rem;"></i>
        </div>
        <div class="phone-progress">
          <div class="phone-progress-fill" id="phoneProgress" style="width:0%"></div>
        </div>
        <div class="phone-content" id="phoneContent">
          <p style="text-align:center; color:#94a3b8; margin-top:60px;">
            <i class="fa-solid fa-pen-to-square" style="font-size:2rem; display:block; margin-bottom:12px; opacity:0.3;"></i>
            왼쪽에서 내용을 작성하면<br>여기서 실시간으로 보입니다
          </p>
        </div>
        <div class="phone-toolbar">
          <span class="phone-toolbar-page" id="phonePageInfo">1 / 1</span>
          <div class="phone-toolbar-nav">
            <button class="phone-nav-btn" onclick="previewPrevPage()"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="phone-nav-btn" onclick="previewNextPage()"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check"></i>
  <span id="toastMsg"></span>
</div>

<!-- Quill JS -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

<script>
// ============================================================
// 상태
// ============================================================
let pages = [];        // [{ id, html }, ...]
let currentPageIdx = 0;
let quill = null;
let previewPageIdx = 0;
let autoSaveTimer = null;

// ============================================================
// 초기화
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  initQuill();
  initPages();
});

function initQuill() {
  quill = new Quill('#quillEditor', {
    theme: 'snow',
    placeholder: '여기에 내용을 입력하세요. 텍스트 서식, 색상, 크기, 이미지를 자유롭게 사용할 수 있습니다.',
    modules: {
      toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline'],
        [{ color: [] }, { background: [] }],
        [{ size: ['small', false, 'large', 'huge'] }],
        [{ list: 'ordered' }, { list: 'bullet' }],
        [{ align: [] }],
        ['blockquote'],
        ['clean']
      ]
    }
  });

  quill.on('text-change', () => {
    saveCurrent();
    updatePreview();
    scheduleAutoSave();
  });
}

function initPages() {
  // 샘플 데이터로 시작
  pages = [
    {
      id: 1,
      html: `<h1>🌟 내벨업 토플 프로그램에 오신 것을 환영합니다!</h1>
<p>이 입문서는 앞으로 4주 또는 8주간 진행될 내벨업 챌린지의 전반적인 내용을 안내합니다.</p>
<p>시작하기 전에 이 입문서를 <strong>꼼꼼하게 읽어주세요.</strong> 프로그램의 구조, 과제 방식, 인증 방법 등 중요한 정보가 담겨 있습니다.</p>
<blockquote>💡 입문서는 언제든지 다시 꺼내볼 수 있으니 걱정하지 마세요!</blockquote>`
    },
    {
      id: 2,
      html: `<h2>📚 프로그램 구성</h2>
<p>내벨업 챌린지는 크게 <strong>5개 영역</strong>으로 구성됩니다.</p>
<ul>
  <li><strong>리딩(Reading)</strong> — 매일 3개 지문, 총 9문제</li>
  <li><strong>리스닝(Listening)</strong> — 강의/대화 지문 기반 문제풀이</li>
  <li><strong>라이팅(Writing)</strong> — 통합형 + 토론형 에세이</li>
  <li><strong>스피킹(Speaking)</strong> — 인터뷰 + 반복 훈련</li>
  <li><strong>보카(Vocabulary)</strong> — 매일 필수 단어 암기</li>
</ul>
<p>각 과제는 <span style="color: rgb(148, 128, 197);">매일 자정까지</span> 제출해야 인증이 완료됩니다.</p>`
    },
    {
      id: 3,
      html: `<h2>✅ 인증 방법</h2>
<p>과제 인증은 자동으로 처리됩니다. 과제를 제출하면 시스템이 자동으로 인증 여부를 판단합니다.</p>
<h3>인증 조건</h3>
<ul>
  <li>리딩: 문제 풀기 + 오답노트 작성</li>
  <li>리스닝: 문제 풀기 완료</li>
  <li>라이팅: 에세이 제출 완료</li>
  <li>스피킹: 녹음 제출 완료</li>
  <li>입문서: 메모 <strong>2개 이상</strong> 작성</li>
</ul>
<blockquote>⚠️ 마감 시간(자정)을 넘기면 인증이 불가하므로 꼭 제때 완료하세요!</blockquote>`
    }
  ];

  renderPageList();
  loadPage(0);
}

// ============================================================
// 페이지 관리
// ============================================================
function renderPageList() {
  const list = document.getElementById('pageList');
  list.innerHTML = pages.map((p, i) => `
    <div class="page-item ${i === currentPageIdx ? 'active' : ''}" onclick="loadPage(${i})">
      <span class="page-num">${i + 1}</span>
      <span class="page-label">${i + 1}페이지</span>
      ${pages.length > 1 ? `<button class="del-btn" onclick="deletePage(event, ${i})"><i class="fa-solid fa-xmark"></i></button>` : ''}
    </div>
  `).join('');
  updatePhoneInfo();
}

function loadPage(idx) {
  saveCurrent(); // 현재 페이지 저장
  currentPageIdx = idx;
  previewPageIdx = idx;
  quill.root.innerHTML = pages[idx].html || '';
  document.getElementById('currentPageLabel').textContent = (idx + 1) + '페이지';
  renderPageList();
  updatePreview();
}

function saveCurrent() {
  if (pages[currentPageIdx] !== undefined) {
    pages[currentPageIdx].html = quill.root.innerHTML;
  }
}

function addPage() {
  saveCurrent();
  const newPage = { id: Date.now(), html: '' };
  pages.push(newPage);
  loadPage(pages.length - 1);
  showToast('새 페이지가 추가되었습니다.', 'success');
}

function deletePage(e, idx) {
  e.stopPropagation();
  if (pages.length <= 1) { showToast('최소 1페이지는 있어야 합니다.', 'info'); return; }
  if (!confirm(`${idx + 1}페이지를 삭제하시겠습니까?`)) return;
  pages.splice(idx, 1);
  const newIdx = Math.min(currentPageIdx, pages.length - 1);
  currentPageIdx = -1; // 강제 reload
  loadPage(newIdx);
  showToast('페이지가 삭제되었습니다.', 'success');
}

// ============================================================
// 미리보기
// ============================================================
function updatePreview() {
  saveCurrent();
  const html = pages[previewPageIdx]?.html || '';
  const content = document.getElementById('phoneContent');

  if (!html || html === '<p><br></p>') {
    content.innerHTML = `<p style="text-align:center; color:#94a3b8; margin-top:60px;">
      <i class="fa-solid fa-pen-to-square" style="font-size:2rem; display:block; margin-bottom:12px; opacity:0.3;"></i>
      내용을 입력하면 여기서 보입니다
    </p>`;
  } else {
    content.innerHTML = html;
  }

  updatePhoneInfo();
  document.getElementById('phoneTitle').textContent = document.getElementById('docTitle').value || '입문서';
}

function updatePhoneInfo() {
  const pct = pages.length > 0 ? Math.round(((previewPageIdx + 1) / pages.length) * 100) : 0;
  document.getElementById('phoneProgress').style.width = pct + '%';
  document.getElementById('phonePageInfo').textContent = (previewPageIdx + 1) + ' / ' + pages.length;
}

function previewPrevPage() {
  if (previewPageIdx > 0) {
    previewPageIdx--;
    updatePreview();
  }
}
function previewNextPage() {
  if (previewPageIdx < pages.length - 1) {
    previewPageIdx++;
    updatePreview();
  }
}

// 제목 변경 시 미리보기 반영
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('docTitle').addEventListener('input', () => {
    document.getElementById('phoneTitle').textContent = document.getElementById('docTitle').value || '입문서';
  });
});

// ============================================================
// 이미지 삽입 (데모: Base64)
// ============================================================
function insertImage(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const range = quill.getSelection(true);
    quill.insertEmbed(range.index, 'image', e.target.result);
    quill.setSelection(range.index + 1);
    showToast('이미지가 삽입되었습니다. (실제 구현 시 Supabase Storage에 업로드)', 'info');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ============================================================
// 저장 (localStorage — 데모)
// ============================================================
function saveDemo() {
  saveCurrent();
  const data = {
    title: document.getElementById('docTitle').value,
    pages: pages,
    savedAt: new Date().toISOString()
  };
  localStorage.setItem('demo_intro_book', JSON.stringify(data));
  showToast('저장 완료! (데모: localStorage에 저장됨)', 'success');
}

function scheduleAutoSave() {
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    saveCurrent();
    const data = {
      title: document.getElementById('docTitle').value,
      pages: pages,
      savedAt: new Date().toISOString()
    };
    localStorage.setItem('demo_intro_book', JSON.stringify(data));
  }, 1500);
}

// 학습자 화면으로 보기
function previewInViewer() {
  saveCurrent();
  const data = {
    title: document.getElementById('docTitle').value,
    pages: pages,
    savedAt: new Date().toISOString()
  };
  localStorage.setItem('demo_intro_book', JSON.stringify(data));
  window.open('viewer.html', '_blank');
}

// ============================================================
// 토스트
// ============================================================
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  const icon = toast.querySelector('i');
  document.getElementById('toastMsg').textContent = msg;
  icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-info';
  toast.className = 'toast show ' + type;
  setTimeout(() => { toast.className = 'toast ' + type; }, 3000);
}

// 페이지 로드 시 저장된 데이터 복원
window.addEventListener('load', () => {
  const saved = localStorage.getItem('demo_intro_book');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.pages && data.pages.length > 0) {
        pages = data.pages;
        document.getElementById('docTitle').value = data.title || '내벨업 입문서 v3';
        renderPageList();
        loadPage(0);
      }
    } catch(e) {}
  }
});
</script>
</body>
</html>
