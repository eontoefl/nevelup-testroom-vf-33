<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이전 학습 기록 (V2)</title>
  <!-- Sentry Error Monitoring & Session Replay -->
  <script
    src="https://js.sentry-cdn.com/9808cf61ad1ab17e40cf6249d4030b9b.min.js"
    crossorigin="anonymous"
  ></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/v2-records-style.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ───────────── TOP BAR ───────────── -->
  <nav class="v2r-topbar">
    <button class="btn-back" onclick="goBackToMypage()" title="뒤로가기">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <span class="v2r-topbar-title">이전 학습 기록</span>
    <div style="width:36px;"></div>
  </nav>

  <!-- ───────────── LOADING ───────────── -->
  <div class="v2r-loading" id="loadingScreen">
    <div class="v2r-spinner"></div>
    <p>학습 기록을 불러오는 중...</p>
  </div>

  <!-- ───────────── NOT LOGGED IN ───────────── -->
  <div class="v2r-not-logged" id="notLoggedScreen" style="display:none;">
    <i class="fa-solid fa-lock" style="font-size:3rem; color:#9480c5; margin-bottom:16px;"></i>
    <h2>로그인이 필요합니다</h2>
    <p>테스트룸에서 먼저 로그인해주세요.</p>
    <button class="v2r-cta-btn" onclick="location.href='index.html'">
      <i class="fa-solid fa-arrow-right"></i> 테스트룸으로 이동
    </button>
  </div>

  <!-- ───────────── MAIN ───────────── -->
  <main class="v2r-page-wrap" id="mainContent" style="display:none;">

    <!-- 상단 안내 -->
    <div class="v2r-notice">
      <i class="fa-solid fa-lock"></i>
      <div>
        <p>이 페이지는 본인만 볼 수 있습니다.</p>
        <p>로그인된 계정의 학습 기록만 표시되며, 다른 수강생의 기록은 열람할 수 없습니다.</p>
      </div>
    </div>

    <!-- 요약 카드 -->
    <section class="v2r-section">
      <h2 class="v2r-section-title">
        <i class="fa-solid fa-chart-pie"></i> 학습 요약
      </h2>
      <div class="v2r-summary-grid">
        <div class="v2r-summary-card">
          <div class="v2r-sc-icon"><i class="fa-solid fa-clipboard-check"></i></div>
          <div class="v2r-sc-body">
            <p class="v2r-sc-label">총 완료 건수</p>
            <p class="v2r-sc-value" id="totalCount">-</p>
          </div>
        </div>
        <div class="v2r-summary-card">
          <div class="v2r-sc-icon"><i class="fa-solid fa-bullseye"></i></div>
          <div class="v2r-sc-body">
            <p class="v2r-sc-label">평균 점수</p>
            <p class="v2r-sc-value" id="avgScore">-</p>
          </div>
        </div>
        <div class="v2r-summary-card">
          <div class="v2r-sc-icon"><i class="fa-solid fa-layer-group"></i></div>
          <div class="v2r-sc-body">
            <p class="v2r-sc-label">유형별 건수</p>
            <div class="v2r-type-chips" id="typeChips">-</div>
          </div>
        </div>
        <div class="v2r-summary-card">
          <div class="v2r-sc-icon"><i class="fa-solid fa-calendar-days"></i></div>
          <div class="v2r-sc-body">
            <p class="v2r-sc-label">학습 기간</p>
            <p class="v2r-sc-value v2r-sc-value-sm" id="studyPeriod">-</p>
          </div>
        </div>
      </div>
    </section>

    <!-- 필터 영역 -->
    <section class="v2r-section">
      <h2 class="v2r-section-title">
        <i class="fa-solid fa-table-list"></i> 상세 기록
      </h2>

      <div class="v2r-filters">
        <div class="v2r-filter-group">
          <label for="filterType">유형</label>
          <select id="filterType">
            <option value="all">전체</option>
            <option value="listening">Listening</option>
            <option value="reading">Reading</option>
            <option value="writing">Writing</option>
            <option value="speaking">Speaking</option>
            <option value="vocab">Vocab</option>
          </select>
        </div>
        <div class="v2r-filter-group">
          <label for="filterWeek">주차</label>
          <select id="filterWeek">
            <option value="all">전체</option>
          </select>
        </div>
        <div class="v2r-filter-group">
          <label for="filterDay">요일</label>
          <select id="filterDay">
            <option value="all">전체</option>
            <option value="월">월</option>
            <option value="화">화</option>
            <option value="수">수</option>
            <option value="목">목</option>
            <option value="금">금</option>
            <option value="일">일</option>
          </select>
        </div>
        <button class="v2r-filter-reset" onclick="resetFilters()">
          <i class="fa-solid fa-rotate-left"></i> 초기화
        </button>
      </div>

      <!-- 테이블 (PC) -->
      <div class="v2r-table-wrap" id="tableWrap">
        <table class="v2r-table">
          <thead>
            <tr>
              <th>주차</th>
              <th>요일</th>
              <th>유형</th>
              <th>점수</th>
              <th>어휘 정답률</th>
              <th>소요 시간</th>
              <th>완료일</th>
              <th>메모</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- 카드 리스트 (모바일) -->
      <div class="v2r-card-list" id="cardList"></div>

      <!-- 더 보기 버튼 -->
      <div class="v2r-load-more-wrap" id="loadMoreWrap" style="display:none;">
        <button class="v2r-load-more-btn" id="loadMoreBtn" onclick="loadMore()">
          <i class="fa-solid fa-chevron-down"></i> 더 보기 (<span id="remainCount">0</span>건 남음)
        </button>
      </div>

      <!-- 데이터 없음 -->
      <div class="v2r-empty" id="emptyState" style="display:none;">
        <i class="fa-solid fa-inbox"></i>
        <p>이전 학습 기록이 없습니다.</p>
      </div>

      <!-- 필터 결과 없음 -->
      <div class="v2r-empty" id="filterEmptyState" style="display:none;">
        <i class="fa-solid fa-filter-circle-xmark"></i>
        <p>해당 조건에 맞는 기록이 없습니다.</p>
      </div>
    </section>

    <!-- 하단 -->
    <div class="v2r-bottom-nav">
      <button class="btn-back" onclick="goBackToMypage()" title="뒤로가기">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
    </div>

  </main>

  <!-- Supabase 클라이언트 -->
  <script src="js/supabase-client.js"></script>

  <script>
  /**
   * ================================================
   * V2 학습 기록 조회 (읽기 전용)
   * ================================================
   * 의존: supabase-client.js (supabaseSelect)
   * 데이터: tr_study_records 테이블
   */

  // ── 전역 상태 ──
  let v2User = null;
  let v2AllData = [];        // 전체 데이터 (원본)
  let v2FilteredData = [];   // 필터된 데이터
  let v2DisplayCount = 20;   // 현재 표시 건수
  const PAGE_SIZE = 20;      // 더 보기 단위

  // ── 초기화 ──
  document.addEventListener('DOMContentLoaded', async () => {
    console.log('📦 [V2 Records] 초기화 시작');

    // 1. 세션 확인
    const saved = sessionStorage.getItem('currentUser');
    if (!saved) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('notLoggedScreen').style.display = 'flex';
      return;
    }

    v2User = JSON.parse(saved);
    console.log('📦 [V2 Records] 유저:', v2User.name);

    // 2. 데이터 로드
    try {
      await loadV2Data();
    } catch (err) {
      console.error('❌ [V2 Records] 데이터 로드 실패:', err);
    }

    // 3. 화면 전환
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'flex';

    // 4. 렌더링
    if (v2AllData.length === 0) {
      document.getElementById('emptyState').style.display = 'flex';
      return;
    }

    renderSummary();
    populateWeekFilter();
    applyFilters();

    // 5. 필터 이벤트
    document.getElementById('filterType').addEventListener('change', applyFilters);
    document.getElementById('filterWeek').addEventListener('change', applyFilters);
    document.getElementById('filterDay').addEventListener('change', applyFilters);
  });

  // ── 데이터 로드 ──
  async function loadV2Data() {
    const userId = v2User.id;
    console.log('📦 [V2 Records] 데이터 로드 - userId:', userId);

    const query = `user_id=eq.${userId}`
      + `&select=week,day,task_type,score,total,time_spent,completed_at,error_note_text,vocab_accuracy_rate,memo_text`
      + `&order=completed_at.asc`;

    v2AllData = await supabaseSelect('tr_study_records', query) || [];
    console.log('📦 [V2 Records] 로드 완료:', v2AllData.length + '건');
  }

  // ── 요약 카드 렌더링 ──
  function renderSummary() {
    // 총 완료 건수
    document.getElementById('totalCount').textContent = v2AllData.length + '건';

    // 평균 점수
    const totalScore = v2AllData.reduce((s, r) => s + (r.score || 0), 0);
    const totalTotal = v2AllData.reduce((s, r) => s + (r.total || 0), 0);
    const avgPct = totalTotal > 0 ? Math.round((totalScore / totalTotal) * 100) : 0;
    document.getElementById('avgScore').textContent = avgPct + '%';

    // 유형별 건수
    const typeCounts = {};
    v2AllData.forEach(r => {
      const t = r.task_type || 'unknown';
      typeCounts[t] = (typeCounts[t] || 0) + 1;
    });
    const typeLabels = {
      listening: 'Listening',
      reading: 'Reading',
      writing: 'Writing',
      speaking: 'Speaking',
      vocab: 'Vocab'
    };
    let chipsHtml = '';
    for (const [key, label] of Object.entries(typeLabels)) {
      if (typeCounts[key]) {
        chipsHtml += `<span class="v2r-chip v2r-chip-${key}">${label} ${typeCounts[key]}</span>`;
      }
    }
    document.getElementById('typeChips').innerHTML = chipsHtml || '-';

    // 학습 기간
    if (v2AllData.length > 0) {
      const first = v2AllData[0].completed_at;
      const last = v2AllData[v2AllData.length - 1].completed_at;
      const firstDate = formatDateOnly(first);
      const lastDate = formatDateOnly(last);
      document.getElementById('studyPeriod').textContent = `${firstDate} ~ ${lastDate}`;
    }
  }

  // ── 주차 필터 옵션 생성 ──
  function populateWeekFilter() {
    const weeks = [...new Set(v2AllData.map(r => r.week))].sort((a, b) => a - b);
    const sel = document.getElementById('filterWeek');
    weeks.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w;
      opt.textContent = `Week ${w}`;
      sel.appendChild(opt);
    });
  }

  // ── 필터 적용 ──
  function applyFilters() {
    const typeVal = document.getElementById('filterType').value;
    const weekVal = document.getElementById('filterWeek').value;
    const dayVal = document.getElementById('filterDay').value;

    v2FilteredData = v2AllData.filter(r => {
      if (typeVal !== 'all' && r.task_type !== typeVal) return false;
      if (weekVal !== 'all' && String(r.week) !== weekVal) return false;
      if (dayVal !== 'all' && r.day !== dayVal) return false;
      return true;
    });

    v2DisplayCount = PAGE_SIZE;
    renderTable();
  }

  function resetFilters() {
    document.getElementById('filterType').value = 'all';
    document.getElementById('filterWeek').value = 'all';
    document.getElementById('filterDay').value = 'all';
    applyFilters();
  }

  // ── 테이블 렌더링 ──
  function renderTable() {
    const tbody = document.getElementById('tableBody');
    const cardList = document.getElementById('cardList');
    const emptyEl = document.getElementById('filterEmptyState');
    const tableWrap = document.getElementById('tableWrap');
    const loadMoreWrap = document.getElementById('loadMoreWrap');

    // 필터 결과 없음
    if (v2FilteredData.length === 0) {
      tbody.innerHTML = '';
      cardList.innerHTML = '';
      emptyEl.style.display = 'flex';
      tableWrap.style.display = 'none';
      cardList.style.display = 'none';
      loadMoreWrap.style.display = 'none';
      return;
    }

    emptyEl.style.display = 'none';
    tableWrap.style.display = '';
    cardList.style.display = '';

    const visibleData = v2FilteredData.slice(0, v2DisplayCount);
    const remaining = v2FilteredData.length - v2DisplayCount;

    // PC 테이블
    let tableHtml = '';
    visibleData.forEach((r, idx) => {
      const hasNote = r.error_note_text && r.error_note_text.trim();
      const hasMemo = r.memo_text && r.memo_text.trim();
      const hasExpandable = hasNote || hasMemo;
      const rowClass = hasExpandable ? 'v2r-row-has-note' : '';
      const expandIcon = hasExpandable ? '<i class="fa-solid fa-chevron-down v2r-row-arrow"></i>' : '';

      // 메모 컬럼: 긴 텍스트 대신 유무 표시
      let memoCell = '-';
      if (hasMemo && hasNote) {
        memoCell = '<span class="v2r-has-icon"><i class="fa-solid fa-note-sticky"></i> 메모</span>';
      } else if (hasMemo) {
        memoCell = '<span class="v2r-has-icon"><i class="fa-solid fa-note-sticky"></i> 메모</span>';
      }

      tableHtml += `<tr class="v2r-row ${rowClass}" ${hasExpandable ? `onclick="toggleAccordion(this, ${idx})"` : ''}>
        <td><span class="v2r-week-badge">W${r.week}</span></td>
        <td>${r.day || '-'}</td>
        <td><span class="v2r-type-badge v2r-type-${r.task_type}">${capitalizeFirst(r.task_type)}</span></td>
        <td>${formatScore(r.score, r.total)}</td>
        <td>${formatVocabRate(r.vocab_accuracy_rate, r.task_type)}</td>
        <td>${formatTime(r.time_spent)}</td>
        <td>${formatDateOnly(r.completed_at)}</td>
        <td>${memoCell} ${expandIcon}</td>
      </tr>`;

      // 아코디언 (오답노트 + 메모)
      if (hasExpandable) {
        let accordionInner = '';
        if (hasNote) {
          accordionInner += `<div class="v2r-accordion-block">
              <div class="v2r-accordion-header">
                <i class="fa-solid fa-pen-to-square"></i> 오답노트
              </div>
              <p class="v2r-accordion-text">${escapeHtml(r.error_note_text)}</p>
            </div>`;
        }
        if (hasMemo) {
          accordionInner += `<div class="v2r-accordion-block">
              <div class="v2r-accordion-header v2r-accordion-header-memo">
                <i class="fa-solid fa-note-sticky"></i> 메모
              </div>
              <p class="v2r-accordion-text">${escapeHtml(r.memo_text)}</p>
            </div>`;
        }
        tableHtml += `<tr class="v2r-accordion" id="accordion-${idx}" style="display:none;">
          <td colspan="8">
            <div class="v2r-accordion-content">
              ${accordionInner}
            </div>
          </td>
        </tr>`;
      }
    });
    tbody.innerHTML = tableHtml;

    // 모바일 카드
    let cardHtml = '';
    visibleData.forEach((r, idx) => {
      const hasNote = r.error_note_text && r.error_note_text.trim();
      const hasMemo = r.memo_text && r.memo_text.trim();
      const hasExpandable = hasNote || hasMemo;

      cardHtml += `<div class="v2r-card ${hasExpandable ? 'v2r-card-has-note' : ''}" ${hasExpandable ? `onclick="toggleCardAccordion(this)"` : ''}>
        <div class="v2r-card-top">
          <span class="v2r-week-badge">W${r.week}</span>
          <span class="v2r-card-day">${r.day || '-'}</span>
          <span class="v2r-type-badge v2r-type-${r.task_type}">${capitalizeFirst(r.task_type)}</span>
          ${hasExpandable ? '<i class="fa-solid fa-chevron-down v2r-card-arrow"></i>' : ''}
        </div>
        <div class="v2r-card-body">
          <div class="v2r-card-row">
            <span class="v2r-card-label">점수</span>
            <span>${formatScore(r.score, r.total)}</span>
          </div>
          <div class="v2r-card-row">
            <span class="v2r-card-label">어휘 정답률</span>
            <span>${formatVocabRate(r.vocab_accuracy_rate, r.task_type)}</span>
          </div>
          <div class="v2r-card-row">
            <span class="v2r-card-label">소요 시간</span>
            <span>${formatTime(r.time_spent)}</span>
          </div>
          <div class="v2r-card-row">
            <span class="v2r-card-label">완료일</span>
            <span>${formatDateOnly(r.completed_at)}</span>
          </div>
          ${hasMemo ? `<div class="v2r-card-row"><span class="v2r-card-label">메모</span><span class="v2r-has-icon"><i class="fa-solid fa-note-sticky"></i> 있음</span></div>` : ''}
        </div>
        ${hasExpandable ? `<div class="v2r-card-accordion" style="display:none;">
          ${hasNote ? `<div class="v2r-accordion-block">
            <div class="v2r-accordion-header"><i class="fa-solid fa-pen-to-square"></i> 오답노트</div>
            <p class="v2r-accordion-text">${escapeHtml(r.error_note_text)}</p>
          </div>` : ''}
          ${hasMemo ? `<div class="v2r-accordion-block">
            <div class="v2r-accordion-header v2r-accordion-header-memo"><i class="fa-solid fa-note-sticky"></i> 메모</div>
            <p class="v2r-accordion-text">${escapeHtml(r.memo_text)}</p>
          </div>` : ''}
        </div>` : ''}
      </div>`;
    });
    cardList.innerHTML = cardHtml;

    // 더 보기 버튼
    if (remaining > 0) {
      loadMoreWrap.style.display = 'flex';
      document.getElementById('remainCount').textContent = remaining;
    } else {
      loadMoreWrap.style.display = 'none';
    }
  }

  // ── 더 보기 ──
  function loadMore() {
    v2DisplayCount += PAGE_SIZE;
    renderTable();
  }

  // ── 아코디언 (PC 테이블) ──
  function toggleAccordion(rowEl, idx) {
    const accordionRow = document.getElementById('accordion-' + idx);
    if (!accordionRow) return;

    const isOpen = accordionRow.style.display !== 'none';
    accordionRow.style.display = isOpen ? 'none' : 'table-row';
    rowEl.classList.toggle('v2r-row-open', !isOpen);
  }

  // ── 아코디언 (모바일 카드) ──
  function toggleCardAccordion(cardEl) {
    const accordion = cardEl.querySelector('.v2r-card-accordion');
    if (!accordion) return;

    const isOpen = accordion.style.display !== 'none';
    accordion.style.display = isOpen ? 'none' : 'block';
    cardEl.classList.toggle('v2r-card-open', !isOpen);
  }

  // ── 네비게이션 ──
  function goBackToMypage() {
    window.location.href = 'mypage.html';
  }

  // ── 포맷 유틸 ──
  function capitalizeFirst(str) {
    if (!str) return '-';
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function formatScore(score, total) {
    if (score == null || total == null) return '-';
    return `${score}/${total}`;
  }

  function formatVocabRate(rate, taskType) {
    if (taskType !== 'vocab') return '-';
    if (rate == null || rate === '') return '-';
    const pct = rate <= 1 ? Math.round(rate * 100) : Math.round(rate);
    return pct + '%';
  }

  function formatTime(seconds) {
    if (seconds == null || seconds === 0) return '-';
    const min = Math.floor(seconds / 60);
    const sec = seconds % 60;
    if (min === 0) return `${sec}초`;
    return `${min}분 ${sec}초`;
  }

  function formatDateOnly(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '-';
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  console.log('✅ v2-records.html 스크립트 로드 완료');
  </script>

</body>
</html>
